<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>천호지 캐릭터 V3 3D 미리보기</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:26px;background:#edf3f7;color:#102f4c;font-family:Pretendard,"Noto Sans KR",sans-serif}header{max-width:1180px;margin:0 auto 19px}h1{margin:0 0 7px;font-size:clamp(26px,4vw,39px);letter-spacing:-1px}p{margin:0;color:#64788b}main{max-width:1180px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{overflow:hidden;border:1px solid #d5e1ea;border-radius:24px;background:#fff;box-shadow:0 16px 44px #183c5617}.title{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px}.title strong{font-size:19px}.view-buttons{display:flex;gap:5px}.view-buttons button{padding:6px 10px;border:1px solid #d7e2eb;border-radius:999px;background:#f6f9fb;color:#597084;font:inherit;font-size:11px;font-weight:800;cursor:pointer}.view-buttons button:hover,.view-buttons button.active{border-color:#80aaca;background:#eaf4fb;color:#16486e}canvas{display:block;width:100%;height:min(70vh,650px);touch-action:none;cursor:grab;background:radial-gradient(circle at 50% 33%,#fff 0,#f7fbfd 51%,#e4edf3 100%)}canvas:active{cursor:grabbing}.note{padding:12px 18px 16px;color:#728495;font-size:12px;line-height:1.55}@media(max-width:760px){body{padding:14px}main{grid-template-columns:1fr}.title{align-items:flex-start;flex-direction:column}canvas{height:500px}}
  </style>
</head>
<body>
  <header><h1>천호지 캐릭터 V3</h1><p>불편한 골짜기 느낌을 줄인 둥글고 단순한 피규어 스타일입니다. 드래그하면 360도로 회전합니다.</p></header>
  <main>
    <article class="card">
      <div class="title"><strong>수달</strong><div class="view-buttons"><button data-model="otter" data-angle="0">정면</button><button data-model="otter" data-angle="1.5708">측면</button><button data-model="otter" data-angle="3.1416">뒷면</button></div></div>
      <canvas id="otter"></canvas><div class="note">눈과 반사를 줄이고 수염을 없앴습니다. 넓은 크림색 주둥이와 짧은 팔다리로 완구 같은 인상을 만들었습니다.</div>
    </article>
    <article class="card">
      <div class="title"><strong>거북이</strong><div class="view-buttons"><button data-model="turtle" data-angle="0">측면</button><button data-model="turtle" data-angle="1.5708">정면</button><button data-model="turtle" data-angle="3.1416">반대 측면</button></div></div>
      <canvas id="turtle"></canvas><div class="note">등딱지 무늬 수와 색 대비를 줄이고 얼굴 요소를 단순화해 부드러운 캐릭터 피규어처럼 정리했습니다.</div>
    </article>
  </main>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js";
    import { createOtterV3, createTurtleV3 } from "../js/cheonhoji-animals-v3-curved.js?rev=cute-turtle";
    function mount(canvas, create, kind){
      const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=.98;renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
      const scene=new THREE.Scene();const camera=new THREE.PerspectiveCamera(29,1,.1,40);camera.position.set(0,kind==="turtle"?1.45:1.95,kind==="turtle"?7.25:7.45);camera.lookAt(0,kind==="turtle"?.82:1.43,0);scene.add(new THREE.HemisphereLight(0xffffff,0x91a4ae,2.8));const key=new THREE.DirectionalLight(0xfffaf0,3.1);key.position.set(-4.5,7,6);key.castShadow=true;scene.add(key);const fill=new THREE.DirectionalLight(0xcfe6f5,1.15);fill.position.set(4,3,5);scene.add(fill);const rim=new THREE.DirectionalLight(0xffd7b5,.85);rim.position.set(4,4,-5);scene.add(rim);
      const model=create();model.rotation.y=kind==="turtle"?-.20:.18;scene.add(model);const floor=new THREE.Mesh(new THREE.CircleGeometry(kind==="turtle"?1.95:1.55,64),new THREE.ShadowMaterial({color:0x19374e,opacity:.15}));floor.rotation.x=-Math.PI/2;floor.position.y=-.04;floor.receiveShadow=true;scene.add(floor);
      let dragging=false,lastX=0,auto=true;canvas.addEventListener("pointerdown",e=>{dragging=true;auto=false;lastX=e.clientX;canvas.setPointerCapture(e.pointerId)});canvas.addEventListener("pointermove",e=>{if(!dragging)return;model.rotation.y+=(e.clientX-lastX)*.012;lastX=e.clientX});canvas.addEventListener("pointerup",()=>dragging=false);canvas.addEventListener("pointercancel",()=>dragging=false);
      function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;if(canvas.width!==Math.floor(w*renderer.getPixelRatio())||canvas.height!==Math.floor(h*renderer.getPixelRatio())){renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}}
      function frame(){resize();if(auto)model.rotation.y+=.0024;renderer.render(scene,camera);requestAnimationFrame(frame)}frame();return{setAngle(angle){auto=false;model.rotation.y=angle}};
    }
    const models={otter:mount(document.querySelector("#otter"),createOtterV3,"otter"),turtle:mount(document.querySelector("#turtle"),createTurtleV3,"turtle")};
    document.querySelectorAll("[data-model][data-angle]").forEach(button=>button.addEventListener("click",()=>{document.querySelectorAll(`[data-model="${button.dataset.model}"]`).forEach(item=>item.classList.remove("active"));button.classList.add("active");models[button.dataset.model].setAngle(Number(button.dataset.angle))}));
  </script>
</body>
</html>
